seed: 42
data:
  dataset_root: /home/zsy/Downloads/dataset-extracted
  train_split: train
  val_split: val
  test_split: test
  image_relpath: patch_tif/0.tif
  review_mask_relpath: patch_tif/0_edit_poly.tif
  label_relpaths:
    lane: label_check_crop/Lane.geojson
    intersection: label_check_crop/Intersection.geojson
  image_size: '256'
  band_indices:
  - 1
  - 2
  - 3
  mask_threshold: 127
  crop_to_review_mask: true
  train_crop_to_review_mask: true
  val_crop_to_review_mask: true
  train_filter_features_by_review_mask: true
  eval_filter_features_by_review_mask: true
  feature_mask_min_inside_ratio: 0.5
  cache_enabled: 'false'
  cache_write_enabled: 'true'
  cache_dir: ''
  cache_namespace: geo_patch_cache_v2
  review_crop_pad_px: 64
  num_workers: 0
  val_num_workers: 0
  train_augment: false
  aug_rot90_prob: 0.25
  aug_hflip_prob: 0.25
  aug_vflip_prob: 0.0
  max_train_samples: null
  max_val_samples: null
  task_enable:
    lane: true
    intersection: true
serialization:
  sample_interval_meter: '6.0'
  coord_bins: '640'
  tasks:
    lane:
      collection_name: Lane
      geometry_type: linestring
      max_features: '32'
      min_points_per_feature: 2
      prompt_template: 'Output patch-local lane text for the current patch. Learn
        lane field names, values, and multi-feature formatting from supervision. The
        final GeoJSON object must be a valid Lane FeatureCollection. The features
        array may contain zero, one, or many lane Features. Do not assume a fixed
        lane count. Do not explain anything. Do not use markdown.

        '
    intersection:
      collection_name: Intersection
      geometry_type: polygon
      max_features: '16'
      min_points_per_feature: 3
      prompt_template: 'Output patch-local intersection text for the current patch.
        Learn intersection field names, values, and multi-feature formatting from
        supervision. The final GeoJSON object must be a valid Intersection FeatureCollection.
        The features array may contain zero, one, or many intersection Features. Do
        not assume a fixed intersection count. Polygon coordinates must be valid GeoJSON
        rings and each ring must be closed, with identical first and last coordinates.
        Do not explain anything. Do not use markdown.

        '
prompt:
  include_geospatial_context: 'true'
  geospatial_precision: '3'
  with_state_suffix: 'Previous cut-point state anchors are provided below as plain-text
    StateAnchor lines and StateGeoJSON. Continue only the local increment needed for
    this patch.

    '
  without_state_suffix: 'No previous cut-point state anchors are available for this
    patch.

    '
text:
  prompt_max_tokens: '192'
  state_max_tokens: '256'
  target_max_tokens: '1024'
state_update:
  enabled: true
  border_margin_px: '128'
  max_features: '4'
  anchor_max_points: '3'
model:
  dino_model_path: ckpts/dinov2
  qwen_model_path: ckpts/qwen
  local_files_only: true
  llm_torch_dtype: float16
  attn_implementation: sdpa
  freeze_satellite: true
  llm_train_mode: lora
  sat_token_hw:
  - 2
  - 2
  sat_patch_size: 14
  sat_drop_cls_token: true
  sat_normalize_input: true
  gradient_checkpointing: true
  lora:
    r: 4
    alpha: 8
    dropout: 0.05
    target_modules:
    - q_proj
    - v_proj
train:
  base_output_dir: outputs/geo_vector_lora
  output_dir: ''
  run_name: ''
  resume_in_place: false
  init_checkpoint: ''
  resume_optimizer: true
  resume_scaler: true
  batch_size: '1'
  val_batch_size: '1'
  epoch_is_single_sample: 'true'
  sample_patch_sequential: 'true'
  val_sample_patch_sequential: 'true'
  epochs: '10'
  optimize_per_sample: 'false'
  lr: '0.00005'
  weight_decay: 0.01
  warmup_steps: 32
  grad_clip_norm: 1.0
  amp: true
  save_latest: true
decode:
  max_new_tokens: '0'
  min_new_tokens: '0'
  max_prop_tokens: '0'
  temperature: '1.0'
  top_k: '1'
  repetition_penalty: '1.02'
  use_kv_cache: 'true'
artifact_export:
  enabled: 'true'
  save_kept_patches: 'true'
  save_discarded_patches: 'true'
  save_resized_patch_inputs: 'true'
  save_train_batch_inputs: 'true'
  save_val_batch_inputs: 'true'
  save_train_batch_geojson: 'true'
  save_val_batch_geojson: 'true'
  save_train_batch_predictions: 'true'
  save_val_batch_predictions: 'true'
  save_eval_sample_geojson: 'true'
  save_predict_tile_geojson: 'true'
  max_batches_per_epoch: '0'
  max_samples_per_batch: '1'
  max_patch_images_per_sample: '1'
evaluation:
  lane_match_distance_m: 2.0
  intersection_iou_threshold: 0.3
  review_mask_min_inside_ratio: 0.5
tiling:
  train:
    enabled: true
    tile_size_px: '768'
    overlap_px: '192'
    keep_margin_px: '96'
    min_review_ratio: 0.002
    min_review_pixels: 2048
    fallback_to_all_if_empty: false
    search_within_review_bbox: true
    allow_empty_tiles: false
    max_tiles_per_sample: null
  eval:
    enabled: true
    tile_size_px: '768'
    overlap_px: '192'
    keep_margin_px: '96'
    min_review_ratio: 0.0
    min_review_pixels: 0
    fallback_to_all_if_empty: true
    search_within_review_bbox: true
    allow_empty_tiles: true
    max_tiles_per_sample: null
  predict:
    enabled: true
    tile_size_px: '768'
    overlap_px: '192'
    keep_margin_px: '96'
    min_review_ratio: 0.0
    min_review_pixels: 0
    fallback_to_all_if_empty: true
    search_within_review_bbox: false
    allow_empty_tiles: true
    max_tiles_per_sample: null
postprocess:
  line_dedup_distance_m: 1.0
  polygon_dedup_iou: 0.5
